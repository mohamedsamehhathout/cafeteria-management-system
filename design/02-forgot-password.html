<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reset Password – CaféDesk</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root { --primary: #6F4E37; --secondary: #D9A066; --bg: #F8F5F2; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Poppins', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); position: relative; overflow: hidden; }

.bg-decor { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
.bg-circle {
  position: absolute; border-radius: 50%; opacity: 0.07;
}
.bg-circle-1 { width: 600px; height: 600px; background: var(--primary); top: -200px; left: -200px; }
.bg-circle-2 { width: 400px; height: 400px; background: var(--secondary); bottom: -100px; right: -100px; }
.bg-circle-3 { width: 200px; height: 200px; background: var(--primary); top: 40%; right: 10%; }

.reset-card {
  position: relative; z-index: 2;
  background: #fff;
  border-radius: 24px;
  box-shadow: 0 20px 80px rgba(111,78,55,0.15);
  width: 480px;
  padding: 52px 48px;
  border: 1px solid rgba(111,78,55,0.08);
}

.step-indicator {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 36px;
}

.step {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; font-weight: 600;
}

.step-num {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
}

.step.active .step-num { background: var(--primary); color: white; }
.step.done .step-num { background: #28A745; color: white; }
.step.inactive .step-num { background: #eee; color: #999; }
.step .step-label { color: #999; }
.step.active .step-label { color: var(--primary); }
.step-connector { flex: 1; height: 2px; background: #eee; border-radius: 2px; }
.step-connector.done { background: #28A745; }

.reset-icon { text-align: center; font-size: 52px; margin-bottom: 16px; }

h2 { text-align: center; font-size: 26px; font-weight: 800; color: #2C1A0E; margin-bottom: 6px; }
.subtitle { text-align: center; font-size: 14px; color: #888; margin-bottom: 36px; line-height: 1.6; }

.form-group { margin-bottom: 20px; }
.form-label { display: block; font-size: 13px; font-weight: 600; color: #4A3020; margin-bottom: 8px; }

.password-wrap { position: relative; }
.form-control {
  width: 100%; padding: 12px 44px 12px 14px;
  border: 2px solid #eee; border-radius: 10px;
  font-family: 'Poppins', sans-serif; font-size: 14px;
  outline: none; transition: all 0.2s; background: #fafafa;
}
.form-control:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(111,78,55,0.08); }
.form-control::placeholder { color: #bbb; }

.eye-btn { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); font-size: 18px; cursor: pointer; color: #bbb; }

.password-strength { margin-top: 8px; }
.strength-bar { height: 4px; border-radius: 2px; background: #eee; margin-bottom: 4px; overflow: hidden; }
.strength-fill { height: 100%; border-radius: 2px; background: #28A745; width: 75%; transition: width 0.3s; }
.strength-label { font-size: 11px; color: #28A745; font-weight: 600; }

.requirement { display: flex; align-items: center; gap: 8px; font-size: 12.5px; margin-top: 12px; }
.req-icon { font-size: 14px; }
.req-text { color: #888; }
.req-text.met { color: #28A745; }

.btn-reset {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, var(--primary), #8B6347);
  color: white; border: none; border-radius: 10px;
  font-family: 'Poppins', sans-serif; font-size: 15px; font-weight: 700;
  cursor: pointer; margin-top: 8px;
  box-shadow: 0 4px 20px rgba(111,78,55,0.35);
}

.back-link { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 20px; font-size: 13px; color: #888; text-decoration: none; }
.back-link span { color: var(--primary); font-weight: 600; }
</style>
</head>
<body>

<div class="bg-decor">
  <div class="bg-circle bg-circle-1"></div>
  <div class="bg-circle bg-circle-2"></div>
  <div class="bg-circle bg-circle-3"></div>
</div>

<div class="reset-card">
  <div class="step-indicator">
    <div class="step done">
      <div class="step-num">✓</div>
      <span class="step-label">Verify</span>
    </div>
    <div class="step-connector done"></div>
    <div class="step active">
      <div class="step-num">2</div>
      <span class="step-label" style="color:var(--primary);">New Password</span>
    </div>
    <div class="step-connector"></div>
    <div class="step inactive">
      <div class="step-num">3</div>
      <span class="step-label">Done</span>
    </div>
  </div>

  <div class="reset-icon">🔐</div>
  <h2>Set New Password</h2>
  <p class="subtitle">Create a strong password for your account.<br>Make sure it's at least 8 characters.</p>

  <form>
    <div class="form-group">
      <label class="form-label">New Password</label>
      <div class="password-wrap">
        <input class="form-control" type="password" placeholder="Enter new password" value="MySecure@123" style="padding-left:14px;">
        <span class="eye-btn">👁️</span>
      </div>
      <div class="password-strength">
        <div class="strength-bar"><div class="strength-fill"></div></div>
        <span class="strength-label">Strong</span>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Confirm Password</label>
      <div class="password-wrap">
        <input class="form-control" type="password" placeholder="Confirm new password" value="MySecure@123" style="padding-left:14px; border-color:#28A745;">
        <span class="eye-btn">👁️</span>
      </div>
    </div>

    <div style="background:#F0FDF4; border-radius:10px; padding:14px 16px; margin-bottom:20px;">
      <div class="requirement">
        <span class="req-icon">✅</span>
        <span class="req-text met">At least 8 characters</span>
      </div>
      <div class="requirement">
        <span class="req-icon">✅</span>
        <span class="req-text met">Contains uppercase letter</span>
      </div>
      <div class="requirement">
        <span class="req-icon">✅</span>
        <span class="req-text met">Contains a number</span>
      </div>
      <div class="requirement">
        <span class="req-icon">✅</span>
        <span class="req-text met">Passwords match</span>
      </div>
    </div>

    <button class="btn-reset">Update Password</button>
  </form>

  <a href="#" class="back-link">← <span>Back to Login</span></a>
</div>

</body>
</html>
